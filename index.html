<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Poisoning Outbreak Analyzer</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #1a7f5e, #2c5f8a, #6b3a9c);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      color: white;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    nav {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      backdrop-filter: blur(10px); background: rgba(255,255,255,0.15);
      padding: 12px 24px; border-radius: 16px;
      z-index: 100;
    }
    nav a { margin: 0 12px; color: white; text-decoration: none; font-weight: 600; }
    nav a:hover { text-decoration: underline; }
    header { text-align: center; margin-top: 110px; }
    h1 { font-size: 2.4rem; text-shadow: 0 2px 6px rgba(0,0,0,0.3); }
    .glass-box {
      width: 85%; max-width: 1000px; margin: 30px auto;
      padding: 25px; border-radius: 20px;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
    }
    iframe { 
      border: none; 
      width: 100%; 
      height: 700px; 
      border-radius: 14px;
      background: white;
    }
    .btn {
      display: inline-block; margin-top: 15px; padding: 10px 20px;
      background: #ffe066; color: #333; border-radius: 10px;
      font-weight: bold; text-decoration: none;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
      background: #ffd700;
    }
    footer { text-align: center; padding: 40px 0; opacity: 0.85; }
    @media (max-width: 768px) {
      h1 { font-size: 1.8rem; }
      .glass-box { width: 95%; padding: 15px; }
      iframe { height: 600px; }
      nav a { margin: 0 8px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="#">Home</a>
    <a href="https://huggingface.co/spaces/kat4everokay/food-poisoning-bert" target="_blank">Open in Hugging Face</a>
  </nav>
  <header>
    <h1>🦠 Food Poisoning Outbreak Analyzer</h1>
    <p>PubMedBERT severity classifier + interactive outbreak charts</p>
  </header>
  <div class="glass-box">
    <!-- ✅ CORRECT: Use the direct Space URL (without /tree/main) -->
    <iframe src="https://kat4everokay-food-poisoning-bert.hf.space"></iframe>
    <div style="text-align: center;">
      <a class="btn" href="https://huggingface.co/spaces/kat4everokay/food-poisoning-bert" target="_blank">
        🔗 Open fullscreen version
      </a>
    </div>
  </div>
  <footer>
    <p>Powered by <strong>Hugging Face Spaces</strong> · Hosted on <strong>GitHub Pages</strong></p>
    <p style="font-size: 12px; margin-top: 10px;">
      Model: Fine-tuned PubMedBERT for foodborne outbreak severity classification
    </p>
  </footer>
</body>
</html>
